<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Virtual</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/main.js" defer></script>
</head>
<body>
    <div id="piano">
        <div id="piano-container" class="keys">
            <li>
                <div class="key white" data-key="65" data-note="C"></div>
                <div class="key black sharp" data-key="87" data-note="C#"></div>
            </li>
            <li>
                <div class="key white" data-key="83" data-note="D"></div>
                <div class="key black sharp" data-key="69" data-note="D#"></div>
            </li>
            <li>
                <div class="key white" data-key="68" data-note="E"></div>
                <div class="key black sharp" data-key="82" data-note="E#"></div>
            </li>
            <li>
                <div class="key white" data-key="70" data-note="F"></div>
                <div class="key black sharp" data-key="84" data-note="F#"></div>
            </li>
            <li>
                <div class="key white" data-key="71" data-note="G"></div>
                <div class="key black sharp" data-key="89" data-note="G#"></div>
            </li>
            <li>
                <div class="key white" data-key="72" data-note="A"></div>
                <div class="key black sharp" data-key="85" data-note="A#"></div>
            </li>
            <li>    
                <div class="key white" data-key="74" data-note="B"></div>
            </li>
            <li>
                <div class="key white" data-key="75" data-note="C2"></div>
                <div class="key black sharp" data-key="79" data-note="C#2"></div>
            </li>
            <li>
                <div class="key white" data-key="76" data-note="D2"></div>
                <div class="key black sharp" data-key="80" data-note="D#2"></div>
            </li>
            <li>
                <div class="key white" data-key="186" data-note="E2"></div>
            </li>
        </div>
    </div>
    <selection class="audios">
        <audio data-note="C" src="sounds/C.mp3"></audio>
        <audio data-note="C#" src="sounds/Cs.mp3"></audio>
        <audio data-note="D" src="sounds/D.mp3"></audio>
        <audio data-note="D#" src="sounds/Ds.mp3"></audio>
        <audio data-note="E" src="sounds/E.mp3"></audio>
        <audio data-note="F" src="sounds/F.mp3"></audio>
        <audio data-note="F#" src="sounds/Fs.mp3"></audio>
        <audio data-note="G" src="sounds/G.mp3"></audio>
        <audio data-note="G#" src="sounds/Gs.mp3"></audio>
        <audio data-note="A" src="sounds/A.mp3"></audio>
        <audio data-note="A#" src="sounds/As.mp3"></audio>
        <audio data-note="B" src="sounds/B.mp3"></audio>
        <audio data-note="C2" src="sounds/C2.mp3"></audio>
        <audio data-note="C#2" src="sounds/Cs2.mp3"></audio>
        <audio data-note="D2" src="sounds/D2.mp3"></audio>
        <audio data-note="D#2" src="sounds/Ds2.mp3"></audio>
        <audio data-note="E2" src="sounds/E2.mp3"></audio>
    </selection>
</body>
</html>
